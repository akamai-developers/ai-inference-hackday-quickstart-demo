# Default-deny ingress for the workshop namespace.
# Pods accept nothing unless an explicit allow rule below opens a port.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: workshop
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
# Allow the ingress controller (any namespace) to reach workspaces on 8080.
# Tighten by replacing the empty namespaceSelector with a label match for your
# ingress controller's namespace (e.g. ingress-nginx).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-ingress-to-workspaces
  namespace: workshop
spec:
  podSelector:
    matchLabels:
      app: workspace
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 8080
---
# Allow only workspaces in this namespace to reach vLLM on 8000.
# Student pods cannot reach each other; everything else is denied.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-workspaces-to-vllm
  namespace: workshop
spec:
  podSelector:
    matchLabels:
      app: vllm
  policyTypes: [Ingress]
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: workspace
        - podSelector:
            matchLabels:
              app: load-test
      ports:
        - protocol: TCP
          port: 8000

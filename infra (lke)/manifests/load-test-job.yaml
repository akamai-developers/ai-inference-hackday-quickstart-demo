# In-cluster load test. Runs vLLM's benchmark_serving.py against the vllm Service.
# Labeled app=load-test so the NetworkPolicy allows it through.
# Tunables: REQUEST_RATE (req/s, "inf" = full blast), NUM_PROMPTS, INPUT_LEN, OUTPUT_LEN.

apiVersion: batch/v1
kind: Job
metadata:
  name: vllm-load-test
  namespace: workshop
  labels:
    app: load-test
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: load-test
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: vllm/vllm-openai:v0.20.2
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail
              echo "Downloading ShareGPT dataset…"
              curl -sSL -o /tmp/sharegpt.json \
                https://huggingface.co/datasets/anon8231489123/ShareGPT_Vicuna_unfiltered/resolve/main/ShareGPT_V3_unfiltered_cleaned_split.json
              echo "Starting vllm bench serve…"
              cd /tmp
              vllm bench serve \
                --backend openai-chat \
                --base-url http://vllm:8000 \
                --endpoint /v1/chat/completions \
                --model "${MODEL:-Qwen/Qwen3-8B-FP8}" \
                --dataset-name sharegpt \
                --dataset-path /tmp/sharegpt.json \
                --num-prompts "${NUM_PROMPTS:-200}" \
                --request-rate "${REQUEST_RATE:-inf}" \
                --max-concurrency "${MAX_CONCURRENCY:-80}" \
                --save-result \
                --result-dir /tmp
              echo "=== Result files ==="
              ls -la /tmp/*.json
              echo "=== Last result ==="
              cat /tmp/*.json | tail -n 1
          env:
            - name: MODEL
              value: "Qwen/Qwen3-8B-FP8"
            - name: NUM_PROMPTS
              value: "200"
            - name: REQUEST_RATE
              value: "inf"
            - name: MAX_CONCURRENCY
              value: "80"
          resources:
            requests:
              cpu: "1"
              memory: "2Gi"
            limits:
              cpu: "2"
              memory: "4Gi"

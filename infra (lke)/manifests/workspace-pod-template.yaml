# Template for student workspace pods.
# Used by generate-pods.sh — do not apply directly.
# Placeholders: STUDENT_NUM, STUDENT_NUM_PADDED, PASSWORD_SECRET_NAME

apiVersion: v1
kind: Pod
metadata:
  name: ws-STUDENT_NUM_PADDED
  namespace: workshop
  labels:
    app: workspace
    student: "STUDENT_NUM"
spec:
  automountServiceAccountToken: false
  containers:
    - name: code-server
      image: ghcr.io/akamai-developers/ai-agents-workspace:latest
      ports:
        - containerPort: 8080
          name: http
      env:
        - name: PASSWORD
          valueFrom:
            secretKeyRef:
              name: PASSWORD_SECRET_NAME
              key: password
        - name: VLLM_HOST
          value: "http://vllm:8000/v1"
        - name: MODEL_NAME
          value: "Qwen/Qwen3-8B-FP8"
      resources:
        requests:
          cpu: "250m"
          memory: "500Mi"
        limits:
          cpu: "1"
          memory: "1Gi"
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
        seccompProfile:
          type: RuntimeDefault
  restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  name: ws-STUDENT_NUM_PADDED
  namespace: workshop
  labels:
    app: workspace
    student: "STUDENT_NUM"
spec:
  type: ClusterIP
  selector:
    app: workspace
    student: "STUDENT_NUM"
  ports:
    - port: 8080
      targetPort: 8080
      protocol: TCP

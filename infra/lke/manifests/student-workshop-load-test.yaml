apiVersion: batch/v1
kind: Job
metadata:
  name: student-flow-smoke-test
  namespace: workshop
  labels:
    app: load-test
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 3600
  template:
    metadata:
      labels:
        app: load-test
    spec:
      restartPolicy: Never
      containers:
        - name: bench
          image: ghcr.io/akamai-developers/ai-inference-hackday-quickstart-demo:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              set -euo pipefail

              cd /home/coder/workshop

              echo "=== Checking vLLM health ==="
              curl -sf http://vllm:8000/health

              echo ""
              echo "=== Checking available models ==="
              curl -sf http://vllm:8000/v1/models

              echo ""
              echo "=== Running Module 1: Benchmark ==="
              python demo/01_bench.py

              echo ""
              echo "=== Running Module 2: Intent Router ==="
              python demo/02_intent_router.py

              echo ""
              echo "=== Running Module 3: Resilience ==="
              python demo/03_resilience.py

              echo ""
              echo "=== Running Module 4: Evaluation ==="
              python demo/04_evaluation.py
          env:
            - name: VLLM_HOST
              value: "http://vllm:8000/v1"

            - name: MODEL_NAME
              value: "Qwen/Qwen3-8B-FP8"

            - name: PREMIUM_MODEL
              value: "gpt-4o-mini"

            - name: PREMIUM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: premium-api-secrets
                  key: PREMIUM_API_KEY
                  optional: true

          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "2Gi"
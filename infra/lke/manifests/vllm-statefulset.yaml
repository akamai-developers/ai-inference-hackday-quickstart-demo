apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: vllm
  namespace: workshop
  labels:
    app: vllm
spec:
  serviceName: vllm
  replicas: 5
  podManagementPolicy: Parallel
  # TP=2 across 2-GPU nodes. Model loaded once per replica (across both GPUs),
  # remaining VRAM pooled as a large shared KV cache.
  selector:
    matchLabels:
      app: vllm
  volumeClaimTemplates:
    - metadata:
        name: model-cache
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: 50Gi
        storageClassName: linode-block-storage
  template:
    metadata:
      labels:
        app: vllm
    spec:
      enableServiceLinks: false
      nodeSelector:
        pool: gpu
      tolerations:
        - key: nvidia.com/gpu
          operator: Exists
          effect: NoSchedule
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchExpressions:
                  - key: app
                    operator: In
                    values: [vllm]
              topologyKey: kubernetes.io/hostname
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.20.2
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: [ALL]
            seccompProfile:
              type: RuntimeDefault
          args:
            - --model=Qwen/Qwen3-8B-FP8
            - --download-dir=/models
            - --tensor-parallel-size=4
            - --gpu-memory-utilization=0.9
            - --max-model-len=32768
            - --reasoning-parser=deepseek_r1
            - --enable-auto-tool-choice
            - --tool-call-parser=hermes
            - --host=0.0.0.0
            - --port=8000
          env:
            - name: HUGGING_FACE_HUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: vllm-secrets
                  key: HUGGING_FACE_HUB_TOKEN
                  optional: true
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "4"
              memory: "16Gi"
              nvidia.com/gpu: 4
            limits:
              nvidia.com/gpu: 4
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            failureThreshold: 60
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            periodSeconds: 30
          volumeMounts:
            - name: model-cache
              mountPath: /models
            - name: dshm
              mountPath: /dev/shm
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 8Gi
